name: route-plans
description: Shared capability definitions for the Onfleet Route Plans and Route Optimization API.
api: onfleet-route-plans-api
operations:
  - id: listRoutePlans
    method: GET
    path: /routePlans
  - id: createRoutePlan
    method: POST
    path: /routePlans
  - id: getRoutePlan
    method: GET
    path: /routePlans/{routePlanId}
  - id: updateRoutePlan
    method: PUT
    path: /routePlans/{routePlanId}
  - id: deleteRoutePlan
    method: DELETE
    path: /routePlans/{routePlanId}
  - id: addTasksToRoutePlan
    method: PUT
    path: /routePlans/{routePlanId}/tasks
  - id: initializeOptimization
    method: POST
    path: /optimizations/scheduled
  - id: startOptimization
    method: POST
    path: /optimizations/{optimizationId}/start
  - id: getOptimizationStatus
    method: GET
    path: /optimizations/{optimizationId}/status
  - id: applyOptimization
    method: POST
    path: /optimizations/{optimizationId}/apply
  - id: abortOptimization
    method: POST
    path: /optimizations/{optimizationId}/abort
