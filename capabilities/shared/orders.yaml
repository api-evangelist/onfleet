name: orders
description: Shared capability definitions for the Onfleet Orders API (courier-client workflow on Onfleet Connect).
api: onfleet-orders-api
operations:
  - id: createOrder
    method: POST
    path: /taskOrders
  - id: getOrder
    method: GET
    path: /taskOrders/{orderShortId}
  - id: updateOrder
    method: PUT
    path: /taskOrders/{orderShortId}
  - id: cancelOrder
    method: POST
    path: /taskOrders/{orderShortId}/cancel
  - id: rejectOrder
    method: POST
    path: /taskOrders/{orderShortId}/reject
  - id: cloneOrders
    method: POST
    path: /taskOrders/clone
  - id: quoteOrder
    method: POST
    path: /taskOrders/quote
