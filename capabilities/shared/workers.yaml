name: workers
description: Shared capability definitions for the Onfleet Workers API.
api: onfleet-workers-api
operations:
  - id: listWorkers
    method: GET
    path: /workers
  - id: createWorker
    method: POST
    path: /workers
  - id: getWorker
    method: GET
    path: /workers/{workerId}
  - id: updateWorker
    method: PUT
    path: /workers/{workerId}
  - id: deleteWorker
    method: DELETE
    path: /workers/{workerId}
  - id: listWorkerAssignedTasks
    method: GET
    path: /workers/{workerId}/tasks
  - id: getDeliveryManifest
    method: GET
    path: /workers/{workerId}/deliveryManifest
