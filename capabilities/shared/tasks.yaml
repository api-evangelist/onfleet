name: tasks
description: Shared capability definitions for the Onfleet Tasks API.
api: onfleet-tasks-api
operations:
  - id: createTask
    method: POST
    path: /tasks
    summary: Create a new pickup or dropoff task.
  - id: listTasks
    method: GET
    path: /tasks/all
    summary: List tasks paginated by lastId.
  - id: getTask
    method: GET
    path: /tasks/{taskId}
  - id: updateTask
    method: PUT
    path: /tasks/{taskId}
  - id: deleteTask
    method: DELETE
    path: /tasks/{taskId}
  - id: cloneTask
    method: POST
    path: /tasks/{taskId}/clone
  - id: forceCompleteTask
    method: POST
    path: /tasks/{taskId}/complete
  - id: createTaskBatch
    method: POST
    path: /tasks/batch
  - id: assignTasksToWorker
    method: PUT
    path: /containers/workers/{workerId}
