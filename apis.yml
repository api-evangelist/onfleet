description: 'Onfleet is an AI-powered last-mile delivery management platform that
  orchestrates fleet operations,

  dispatch, route optimization, and customer experience across internal and outsourced
  delivery fleets.

  The platform powers 400M+ deliveries for brands including Eaze, Total Wine & More,
  Pizza Hut, Kroger,

  and Urbanstems across industries from prepared meals and grocery to cannabis, pharmacy,
  and

  furniture. Onfleet exposes a comprehensive REST API v2.7 for tasks, workers, route
  plans, route

  optimization, orders, recipients, destinations, organizations/teams, and webhooks
  — backed by

  official SDKs in Python, Node.js, PHP, Java, and Go, plus the 150+ courier Onfleet
  Connect network.

  '
