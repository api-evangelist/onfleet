- type: Features
  data:
  - REST API v2.7 over HTTPS with Basic Auth using the API key as the username and
    an empty password
  - Base URL https://onfleet.com/api/v2; JSON-only request and response bodies
  - 24-character URL-safe resource IDs; GeoJSON [longitude, latitude] coordinates;
    Unix-millisecond timestamps; E.164 phone numbers
  - Tasks API with create, batch create (100 per request), clone, force-complete,
    dependencies, custom fields, and metadata search
  - Workers API with vehicle metadata (CAR / MOTORCYCLE / BICYCLE / TRUCK), capacity,
    additionalCapacities, and route delivery manifest
  - Route Plans API for hub-to-hub routes plus asynchronous Route Optimization (task-based,
    vehicle-based, auto-dispatch) — Enterprise plan endpoints
  - Orders API for pickup-dropoff pair workflows on the Onfleet Connect courier network
    (quote, create, update, clone, cancel, reject)
  - Recipients and Destinations APIs with geocoding and reusable resource lookup by
    name/phone
  - Team Auto-Dispatch (Beta) for batched assignment of unassigned tasks to a team
  - Webhooks API with 27 trigger types — full task lifecycle, worker duty/CRUD, route
    plan events, SMS opt-out, predictive delay, and async job completions
  - HMAC-SHA256 webhook signing via /webhooks/secret with X-Onfleet-Signature header
  - lastId-based pagination on List Tasks (up to 64 per page); 70-second server timeout
    on long-running queries
  - Official SDKs for Python, Node.js, PHP, Java, and Go; archived Ruby SDK; Postman
    collection
  - AI-powered route optimization trained on 400M+ deliveries; predictive ETA and
    delay alerts
  - Proof of delivery with photos, signatures, timestamps, barcode scanning, and ID
    verification (Scale+)
  - Branded customer tracking pages and two-way driver-customer chat
  - Driver mobile apps (iOS and Android) rated 4.7 stars on both stores
  - 150+ courier partners via Onfleet Connect
  - Native integrations with Shopify, Zapier, GigSmart, Dutchie, Zendrive
  sources:
  - https://docs.onfleet.com/
  - https://docs.onfleet.com/reference/introduction
