    '
- aid: onfleet:onfleet-route-plans-api
  name: Onfleet Route Plans API
  tags:
  - Last Mile Delivery
  - Route Optimization
  - Route Plans
  humanURL: https://docs.onfleet.com/reference/routeplan
  baseURL: https://onfleet.com/api/v2
  properties:
  - url: https://docs.onfleet.com/reference/routeplan.md
