    type: GraphQL
  description: 'Create, list, fetch, update, clone, force-complete, and delete pickup/dropoff
    tasks. Tasks are the

    atomic unit of work in Onfleet — each has a destination, recipient, completion
    window, optional

    dependencies, and a state lifecycle (Unassigned → Assigned → Active → Completed).
    Supports

    batch creation (up to 100 per request) and assignment to workers via the containers
    endpoint.

    '
